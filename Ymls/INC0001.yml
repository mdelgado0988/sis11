Rules:
  - condition: _pol.periodicity=="m"
    name: "12 Installments / Monthly"
    dueDaysFirstInstallment: 0
    maxInstallments: 12
    defaultInstallments: 12
    defaultPremiumPeriodicity: "m"
    defaultPaymentMethod: "PRO"
    Detail:
      - condition: _installment.numberInYear < 12
        amount: /*block*/ doCmd({cmd:'ExeChain', data:{chain:'cmdGetModalPremiumCoverageInstallment', context:'{policyId:'+ _pol.id +',anualPremium:'+ _pol.anualPremium +',frequency:"' + _pol.periodicity + '"}'}}); Math.round(ExeChain.outData*100)/100;
        concept: "'Detalle de cuota #'+_installment.numberInYear"
        detail: "'Prima Cobertura'"
        order: _lineNumber
      #- condition: _installment.numberInYear < 12
      #  amount: 0
      #  concept: "'Detalle de cuota #'+_installment.numberInYear"
      #  detail: "'Fees'"
      #  order: _lineNumber
      - condition: _installment.numberInYear < 12
        amount: Math.round(_pol.tax/12*100)/100;
        concept: "'Detalle de cuota #'+_installment.numberInYear"
        detail: "'Impuesto de Seguros'"
        order: _lineNumber
      - condition: _installment.numberInYear==12
        amount: /*block*/ doCmd({cmd:'ExeChain', data:{chain:'cmdGetModalPremiumCoverageInstallment', context:'{policyId:'+ _pol.id +',anualPremium:'+ _pol.anualPremium +',frequency:"' + _pol.periodicity + '",isPremiumFactor:true}'}}); Math.round(ExeChain.outData*100)/100;
        concept: "'Detalle de cuota #'+_installment.numberInYear"
        detail: "'Prima Cobertura'"
        order: _lineNumber
     #- condition: _installment.numberInYear==12
     #   amount: 0
     #   concept: "'Detalle de cuota #'+_installment.numberInYear"
     #   detail: "'Fees'"
     #   order: _lineNumber
      - condition: _installment.numberInYear==12
        amount: Math.round(((Math.round(_pol.tax/12*100)/100)+(_pol.tax-((Math.round(_pol.tax/12*100)/100)*12)))*100)/100;
        concept: "'Detalle de cuota #'+_installment.numberInYear"
        detail: "'Impuesto de Seguros'"
        order: _lineNumber
